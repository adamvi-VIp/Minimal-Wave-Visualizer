name: Release native helper

on:
  push:
    tags:
      - v*

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Validate tag version
        shell: pwsh
        run: |
          $tagVersion = $env:GITHUB_REF_NAME.TrimStart('v')
          [xml]$project = Get-Content .\bass-helper\MinimalWaveBassHelper.csproj -Raw
          $projectVersion = [string]$project.Project.PropertyGroup.Version
          if ($tagVersion -ne $projectVersion) {
            throw "Tag $tagVersion does not match helper version $projectVersion."
          }

      - name: Build release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path .\release -Force | Out-Null
          dotnet publish .\bass-helper\MinimalWaveBassHelper.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -o .\release\publish

          $releaseExe = '.\release\MinimalWaveBassHelper-win-x64.exe'
          Copy-Item .\release\publish\MinimalWaveBassHelper.exe $releaseExe
          $selfCheck = Start-Process `
            -FilePath $releaseExe `
            -ArgumentList '--self-check' `
            -Wait `
            -PassThru `
            -WindowStyle Hidden
          if ($selfCheck.ExitCode -ne 0) {
            throw 'Release helper self-check failed.'
          }

          $hash = (Get-FileHash $releaseExe -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  MinimalWaveBassHelper-win-x64.exe" |
            Set-Content .\release\SHA256SUMS.txt -Encoding ascii
          Copy-Item .\install-native.ps1, .\uninstall-native.ps1 .\release\

      - name: Attest helper build provenance
        uses: actions/attest@v4
        with:
          subject-path: release/MinimalWaveBassHelper-win-x64.exe

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $env:GITHUB_REF_NAME `
            --verify-tag `
            --generate-notes `
            --title "Minimal Wave Visualizer $env:GITHUB_REF_NAME" `
            .\release\MinimalWaveBassHelper-win-x64.exe `
            .\release\SHA256SUMS.txt `
            .\release\install-native.ps1 `
            .\release\uninstall-native.ps1
